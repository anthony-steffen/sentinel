services:
  - type: web
    name: sentinel-fraud-api
    runtime: python
    plan: free
    buildCommand: cd sentinel-fraud-api && pip install -r requirements.txt
    preDeployCommand: cd sentinel-fraud-api && alembic upgrade head
    startCommand: cd sentinel-fraud-api && uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-fraud-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: LOGIN_RATE_LIMIT
        value: 10
      - key: LOGIN_RATE_WINDOW_SECONDS
        value: 60
      - key: TRANSACTION_RATE_LIMIT
        value: 30
      - key: TRANSACTION_RATE_WINDOW_SECONDS
        value: 60
      - key: CORS_ALLOWED_ORIGINS
        value: https://sentinel-fraud-web.onrender.com

  - type: web
    name: sentinel-fraud-web
    runtime: static
    buildCommand: cd sentinel-fraud-web && npm ci && npm run build
    staticPublishPath: sentinel-fraud-web/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sentinel-fraud-api.onrender.com
      - key: VITE_WS_BASE_URL
        value: wss://sentinel-fraud-api.onrender.com/notifications/ws
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sentinel-fraud-db
    plan: free
    databaseName: sentinel
    user: sentinel
    postgresMajorVersion: "17"
